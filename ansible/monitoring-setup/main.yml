---
# Deploy Prometheus Node Exporter + Grafana Agent

- name: Setup Monitoring
  hosts: all
  become: true
  vars:
    node_exporter_version: "1.8.2"
    grafana_agent_version: "0.42.0"
    grafana_agent_config:
      server:
        log_level: warn
      metrics:
        global:
          scrape_interval: 15s
        configs:
          - name: default
            scrape_configs:
              - job_name: node_exporter
                static_configs:
                  - targets: ["localhost:9100"]
      logs:
        configs:
          - name: default
            positions:
              filename: /tmp/positions.yaml
            clients:
              - url: "http://localhost:3100/loki/api/v1/push"
            scrape_configs:
              - job_name: varlog
                static_configs:
                  - targets: ["localhost"]
                    labels:
                      job: varlog
                      __path__: /var/log/*log
  tasks:
    - name: Download Node Exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"

    - name: Extract Node Exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: true

    - name: Install Node Exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: "/usr/local/bin/node_exporter"
        mode: "0755"
        remote_src: true

    - name: Create node_exporter user
      ansible.builtin.user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Deploy Node Exporter systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter \
            --collector.systemd \
            --collector.docker \
            --web.listen-address=:9100

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Restart node_exporter

    - name: Enable and start Node Exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    - name: Download Grafana Agent
      ansible.builtin.get_url:
        url: "https://github.com/grafana/agent/releases/download/v{{ grafana_agent_version }}/grafana-agent-linux-amd64"
        dest: /usr/local/bin/grafana-agent
        mode: "0755"

    - name: Create grafana-agent user
      ansible.builtin.user:
        name: grafana-agent
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create Grafana Agent config directory
      ansible.builtin.file:
        path: /etc/grafana-agent
        state: directory
        mode: "0755"

    - name: Deploy Grafana Agent config
      ansible.builtin.copy:
        dest: /etc/grafana-agent/agent.yaml
        content: "{{ grafana_agent_config | to_nice_yaml }}"
        owner: grafana-agent
        group: grafana-agent
        mode: "0644"
      notify: Restart grafana_agent

    - name: Deploy Grafana Agent systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/grafana-agent.service
        content: |
          [Unit]
          Description=Grafana Agent
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=grafana-agent
          Group=grafana-agent
          Type=simple
          ExecStart=/usr/local/bin/grafana-agent \
            --config.file=/etc/grafana-agent/agent.yaml \
            --storage.path=/var/lib/grafana-agent
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Restart grafana_agent

    - name: Create Grafana Agent data directory
      ansible.builtin.file:
        path: /var/lib/grafana-agent
        state: directory
        owner: grafana-agent
        group: grafana-agent
        mode: "0755"

    - name: Enable and start Grafana Agent
      ansible.builtin.systemd:
        name: grafana-agent
        state: started
        enabled: true
        daemon_reload: true

  handlers:
    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted

    - name: Restart grafana_agent
      ansible.builtin.systemd:
        name: grafana-agent
        state: restarted