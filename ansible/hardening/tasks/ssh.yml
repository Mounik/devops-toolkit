---
# SSH Hardening Tasks

- name: Install OpenSSH server
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true

- name: Ensure sshd privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure SSH daemon
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?{{ item.key }}\\s"
    line: "{{ item.key }} {{ item.value }}"
    validate: "sshd -t -f %s"
  loop: "{{ sshd_config }}"
  notify: Restart sshd

- name: Disable empty passwords
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitEmptyPasswords"
    line: "PermitEmptyPasswords no"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: Disable X11 forwarding
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?X11Forwarding"
    line: "X11Forwarding no"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: Remove insecure host key types
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?HostKey\\s+/etc/ssh/ssh_host_dsa_key"
    state: absent
  notify: Restart sshd

- name: Configure SSH ciphers and MACs
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED - HARDENED CIPHERS"
    block: |
      KexAlgorithms {{ ssh_kex_algorithms | regex_replace('\s+', '') }}
      Ciphers {{ ssh_ciphers | regex_replace('\s+', '') }}
      MACs {{ ssh_macs | regex_replace('\s+', '') }}
    validate: "sshd -t -f %s"
  notify: Restart sshd
