---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../requirements.yml
driver:
  name: docker
platforms:
  - name: hardening-test
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
  options:
    v: true
verifier:
  name: ansible
