---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../requirements.yml
driver:
  name: docker
platforms:
  - name: hardening-test
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../.."
  playbooks:
    converge: converge.yml
  options:
    v: true
  config_options:
    defaults:
      callback_whitelist: default
verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
