---
# Handlers for hardening playbook

- name: Restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: Restart auditd
  ansible.builtin.command: augenrules
  changed_when: true
  notify: Reload auditd rules

- name: Reload auditd rules
  ansible.builtin.command: kill -USR1 $(cat /var/run/auditd.pid)
  changed_when: true

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Restart unattended-upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    state: restarted