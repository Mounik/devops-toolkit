name: CI & Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly security scan

env:
  DOCKER_BUILDKIT: 1

jobs:
  shellcheck:
    name: 🐚 Shell Scripts Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh || exit 1

  ansible-lint:
    name: ⚙️ Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ansible-lint ansible-core
      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml
      - name: Run ansible-lint
        run: ansible-lint ansible/ || exit 1

  yamllint:
    name: 📄 YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install yamllint
      - name: Run yamllint
        run: yamllint -s ansible/ ci/ docker/ || exit 1

  hadolint:
    name: 🐳 Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

  trivy-scan:
    name: 🔒 Dockerfile Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  ansible-molecule:
    name: 🧪 Ansible Molecule Tests
    runs-on: ubuntu-latest
    needs: [ansible-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install molecule[docker] ansible-core
      - run: |
          cd ansible/hardening && molecule test

  terraform-fmt:
    name: 🏗️ Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

  k8s-validate:
    name: ☸️ Kubernetes Manifests Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate k8s manifests
        run: |
          kubectl apply --dry-run=client -f kubernetes/base/ || true
          kubectl apply --dry-run=client -f kubernetes/monitoring/ || true
