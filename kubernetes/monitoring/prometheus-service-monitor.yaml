---
# Prometheus ServiceMonitor for scraping app metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: app-metrics
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - devops-toolkit
  selector:
    matchLabels:
      app: devops-toolkit
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
---
# Grafana dashboard ConfigMap (import via sidecar)
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-toolkit-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  devops-toolkit.json: |
    {
      "title": "DevOps Toolkit App",
      "tags": ["devops-toolkit", "app"],
      "timezone": "browser",
      "panels": [
        {
          "title": "CPU Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"devops-toolkit\"}[5m])"
            }
          ]
        }
      ]
    }
